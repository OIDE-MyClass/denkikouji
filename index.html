<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第2種電気工事士 技能補習日別スケジュール（7/13 3周完了版）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --secondary: #fbbf24;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --border: #334155;
            --off-day: #1e1b4b; /* 行事休みの背景色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 45px 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            position: relative;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--text);
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ダッシュボードステータス */
        .status-bar {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-around;
            margin-top: -30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .status-item {
            text-align: center;
            min-width: 120px;
        }

        .status-val {
            display: block;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .status-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* 凡例・ナビゲーション */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .view-title {
            font-size: 1.5rem;
            font-weight: bold;
            border-left: 6px solid var(--secondary);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-phase0 { background-color: var(--secondary); }
        .dot-groupA { background-color: #38bdf8; }
        .dot-groupB { background-color: #ec4899; }
        .dot-groupC { background-color: #a855f7; }
        .dot-groupD { background-color: #eab308; }
        .dot-phase2 { background-color: #10b981; }
        .dot-phase3 { background-color: #f43f5e; }
        .dot-off { background-color: #64748b; }

        /* 日別カレンダーレイアウト */
        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border-left: 6px solid var(--border);
            display: grid;
            grid-template-columns: 180px 1fr 120px;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--border);
            border-left-width: 6px;
            transition: all 0.2s ease;
        }

        .day-card:hover {
            transform: translateX(5px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* 進行状況に応じたカードボーダーカラー */
        .p-0 { border-left-color: var(--secondary); }
        .g-a { border-left-color: #38bdf8; }
        .g-b { border-left-color: #ec4899; }
        .g-c { border-left-color: #a855f7; }
        .g-d { border-left-color: #eab308; }
        .p-2 { border-left-color: #10b981; }
        .p-3 { border-left-color: #f43f5e; }
        .off { 
            border-left-color: #64748b; 
            background: var(--off-day);
            opacity: 0.75;
        }

        .day-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-date {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text);
        }

        .day-label {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
        }

        .day-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .day-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .day-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        .day-action {
            display: flex;
            justify-content: flex-end;
        }

        /* カスタムチェックボックスボタン */
        .check-btn {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            width: 100%;
            justify-content: center;
        }

        .check-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
        }

        .day-card.completed {
            opacity: 0.6;
            background: rgba(30, 41, 59, 0.3);
        }

        .day-card.completed .check-btn {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #0f172a;
        }

        .day-card.completed .day-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 学校行事休みの特別装飾 */
        .off .check-btn {
            display: none;
        }
        .off-badge {
            background: #475569;
            color: #f1f5f9;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .day-card {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .day-action {
                justify-content: flex-start;
                width: 100%;
            }
            .status-bar {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fa-solid fa-calendar-days" style="color: var(--secondary);"></i> 技能補習日別ロードマップ</h1>
    <p>7/13 3周完了特化版 ｜ 学校行事調整済・効率優先スケジュール</p>
</header>

<div class="container">
    <!-- 進捗ダッシュボード -->
    <div class="status-bar">
        <div class="status-item">
            <span class="status-val" id="days-left">--日</span>
            <span class="status-label">試験まで</span>
        </div>
        <div class="status-item">
            <span class="status-val" id="completed-count">0 / 30</span>
            <span class="status-label">補習完了数</span>
        </div>
        <div class="status-item">
            <span class="status-val" id="progress-percent">0%</span>
            <span class="status-label">練習進捗率</span>
        </div>
    </div>

    <!-- コントロールと凡例 -->
    <div class="controls">
        <div class="view-title">
            <i class="fa-solid fa-list-check"></i>
            トレーニングメニュー（平日放課後16:00〜18:00）
        </div>
        <div class="legend">
            <div class="legend-item"><span class="dot dot-phase0"></span>複線図</div>
            <div class="legend-item"><span class="dot dot-groupA"></span>A:基本形</div>
            <div class="legend-item"><span class="dot dot-groupB"></span>B:スイッチ</div>
            <div class="legend-item"><span class="dot dot-groupC"></span>C:特殊盤</div>
            <div class="legend-item"><span class="dot dot-groupD"></span>D:配管</div>
            <div class="legend-item"><span class="dot dot-phase2"></span>2周目</div>
            <div class="legend-item"><span class="dot dot-phase3"></span>3周目</div>
            <div class="legend-item"><span class="dot dot-off"></span>休み（行事）</div>
        </div>
    </div>

    <!-- カレンダータイムライン -->
    <div class="timeline-container" id="schedule-timeline">
        <!-- JavaScriptで日別の全予定を展開 -->
    </div>
</div>

<script>
    // 2026年 補習日別全データ
    const scheduleData = [
        // Phase 0: 複線図 3日間
        { date: "6/01", day: "月", phase: "p-0", label: "複線図集中", title: "複線図の基本＆No.1〜5", desc: "電線の接地側（極白）と非接地側（極黒）の接続ルールを徹底習得します。" },
        { date: "6/02", day: "火", phase: "p-0", label: "複線図集中", title: "3路・4路・パイロットランプ＆No.6〜10", desc: "複雑なスイッチ回路を整理。配線色を決定する共通ルールを固定します。" },
        { date: "6/03", day: "水", phase: "p-0", label: "複線図集中", title: "全13問タイムトライアル(3分目標)", desc: "問題を見た瞬間に、迷わず正確に複線図が完成できる状態に引き上げます。" },
        
        // 1周目: グループ別（効率定着）
        { date: "6/04", day: "木", phase: "g-a", label: "1周目:Group A", title: "公表問題 No.1 (基本回路)", desc: "基本 of VVFストリップおよびランプレセプタクルの輪作り。寸法計算の理解。" },
        { date: "6/05", day: "金", phase: "g-a", label: "1周目:Group A", title: "公表問題 No.2 (常時点灯PL)", desc: "パイロットランプ常時点灯の結線ルール。メタルラス壁防護の施工。" },
        { date: "6/08", day: "月", phase: "g-a", label: "1周目:Group A", title: "公表問題 No.3 (タイムスイッチ)", desc: "端子台をタイムスイッチに見立てた回路。基本配線の精度重視。" },
        { date: "6/09", day: "火", phase: "g-a", label: "1周目:Group A", title: "公表問題 No.5 ＆ No.9 (コンセント基本)", desc: "類似性の高い2つのコンセント結線(20A接地極・EET)を同日施工し、効率的にマスターします。" },
        { date: "6/10", day: "水", phase: "g-a", label: "1周目:Group A", title: "公表問題 No.10 (同時点滅PL)", desc: "同時点滅回路は結線の難関。落ち着いて確実に施工。器具の破損に注意。" },
        
        { date: "6/11", day: "木", phase: "g-b", label: "1周目:Group B", title: "公表問題 No.6 (3路スイッチ)", desc: "3路スイッチ(0番端子)の配線ルール。共通線の色に決まりを作ります。" },
        { date: "6/12", day: "金", phase: "g-b", label: "1周目:Group B", title: "公表問題 No.7 (4路スイッチ)", desc: "3路の間に割り込む4路スイッチの複雑配線。複線図通りの結線を。" },
        
        { date: "6/15", day: "月", phase: "g-c", label: "1周目:Group C", title: "公表問題 No.4 (動力3相3線)", desc: "ブレーカーおよび端子台結線。配線の極性とネジ締めトルクを確認。" },
        { date: "6/16", day: "火", phase: "g-c", label: "1周目:Group C", title: "公表問題 No.8 (リモコンリレー)", desc: "端子台代用のリモコンリレー回路。渡り線の寸法を一定に保つ。" },
        { date: "6/17", day: "水", phase: "g-c", label: "1周目:Group C", title: "公表問題 No.13 (自動点滅器)", desc: "自動点滅器端子台への結線。施工条件に沿った配線色の固定。" },
        { date: "6/18", day: "木", phase: "g-d", label: "1周目:Group D", title: "公表問題 No.11 (ねじなし管)", desc: "金属電線管（E管）のボックス取付、ネジ頭のねじ切り、ボンド線掛け。" },
        
        // 学校行事休み (1)
        { date: "6/19", day: "金", phase: "off", label: "補習なし", title: "【学校行事】補習お休み", desc: "今日は補習はありません。しっかり体を休めるか、自宅で複線図のイメトレをしましょう。" },
        { date: "6/22", day: "月", phase: "off", label: "補習なし", title: "【学校行事】補習お休み", desc: "補習はありません。明日から1周目の最終仕上げ（PF配管工事）が始まります。" },
        
        // 1周目の仕上げ
        { date: "6/23", day: "火", phase: "g-d", label: "1周目:Group D", title: "公表問題 No.12 (合成樹脂管)", desc: "PF管コネクタのロック、電線管の通し方の順番。これで1周目全13問が完了！" },

        // 2周目: スピードアップ（平日7日間で全13問を回すため、1日2問特訓を導入）
        { date: "6/24", day: "水", phase: "p-2", label: "2周目:スピード", title: "公表問題 No.1 ＆ No.2 (各40分制限)", desc: "ここからタイム測定を開始。器具・電線加工の手順を無駄なく組み換え。" },
        { date: "6/25", day: "木", phase: "p-2", label: "2周目:スピード", title: "公表問題 No.3 ＆ No.4 (各40分制限)", desc: "スピードと同時に「欠陥基準（芯線のはみ出し、ネジゆるみ）」を厳しく自己確認。" },
        { date: "6/26", day: "金", phase: "p-2", label: "2周目:スピード", title: "公表問題 No.5 ＆ No.6 (各40分制限)", desc: "3路スイッチの共通端子(0番)の結線を迷わずノータイムで施工できるように特訓。" },
        { date: "6/29", day: "月", phase: "p-2", label: "2周目:スピード", title: "公表問題 No.7 ＆ No.8 (各40分制限)", desc: "4路スイッチ、リモコンリレー回路。複雑な問題こそ作業整理が威力を発揮。" },
        { date: "6/30", day: "火", phase: "p-2", label: "2周目:スピード", title: "公表問題 No.9 ＆ No.10 (各40分制限)", desc: "同時点滅回路は結線時間を要するため、その他の基本パーツを極限まで加速。" },
        { date: "7/01", day: "水", phase: "p-2", label: "2周目:スピード", title: "公表問題 No.11 ＆ No.12 (各40分制限)", desc: "金属管・PF管の接続を焦らず正確に。力任せではなく正しい工具の使い方で。" },
        { date: "7/02", day: "木", phase: "p-2", label: "2周目完了", title: "公表問題 No.13 (40分制限)", desc: "2周目最後の1問。タイムを計測し、行事休みに入る前の最終仕上がりを確認。" },
        
        // 学校行事休み (2)
        { date: "7/03", day: "金", phase: "off", label: "補習なし", title: "【学校行事】補習お休み", desc: "今日から週明けにかけて補習はお休みです。行事に全力で取り組みましょう。" },
        { date: "7/06", day: "月", phase: "off", label: "補習なし", title: "【学校行事】補習お休み", desc: "補習はありません。行事終了後、いよいよ最終の「3周目 模擬試験」が始まります。" },
        { date: "7/07", day: "火", phase: "off", label: "補習なし", title: "【学校行事】補習お休み", desc: "補習お休み最終日。明日から本番さながらのタイムトライアルを開始します。" },

        // 3周目（模擬試験モード・30分目標）: 7月13日までに全問走破！
        { date: "7/08", day: "水", phase: "p-3", label: "3周目:模擬戦", title: "模擬試験 No.1, No.2, No.3, No.4 (30分切目標)", desc: "本番と同様の資材状態から開始。見直し時間を確保する練習。合計4問施工。" },
        { date: "7/09", day: "木", phase: "p-3", label: "3周目:模擬戦", title: "模擬試験 No.5, No.6, No.7, No.8 (30分切目標)", desc: "端子台・スイッチ類の完璧な施工。圧着マーク・極性の徹底確認。合計4問施工。" },
        { date: "7/10", day: "金", phase: "p-3", label: "3周目:模擬戦", title: "模擬試験 No.9, No.10, No.11 (30分切目標)", desc: "同時点滅と管工事のスピード攻略。重大欠陥ゼロを維持します。合計3問施工。" },
        { date: "7/13", day: "月", phase: "p-3", label: "3周目完了", title: "模擬試験 No.12, No.13 (30分切目標)", desc: "【目標達成】本日で3周目全13問の走破完了！いかなる課題にも動じない技術を確立。" },

        // 直前週: 最終調整（3周目が終わっているため、十分に余裕を持って弱点補強が可能）
        { date: "7/14", day: "火", phase: "p-3", label: "直前総点検", title: "弱点箇所ピンポイント訓練（のの字曲げ・圧着等）", desc: "これまでのミス傾向に基づき、リングスリーブ圧着やねじ締めのトルク確認などの個別練習。" },
        { date: "7/15", day: "水", phase: "p-3", label: "直前総点検", title: "器具取付＆結線部分のスピード再点検", desc: "器具配置、連用枠の表裏、電線剥ぎ取り寸法の最終点検を行います。" },
        { date: "7/16", day: "木", phase: "p-3", label: "直前総点検", title: "施工条件のひっかけ読解トレーニング", desc: "過去問から施工条件の変更パターンを読み解き、本番の読込ミスを防ぎます。" },
        { date: "7/17", day: "金", phase: "p-3", label: "直前総点検", title: "最終イメージトレーニング ＆ 工具配置チェック", desc: "本番の持ち物を最終チェック。合格のビジョンを描いて前日は早めに休みましょう！" }
    ];

    // 試験日
    const examDate = new Date("2026-07-18");

    // カウントダウン
    function updateCountdown() {
        const today = new Date("2026-05-26"); // 開発時仮日時基準
        const diffTime = examDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById("days-left").innerText = diffDays + "日";
    }

    // カレンダーUIの生成
    function generateTimeline() {
        const container = document.getElementById("schedule-timeline");
        container.innerHTML = "";

        const completedTasks = JSON.parse(localStorage.getItem("completedTasks") || "[]");

        scheduleData.forEach((item, index) => {
            const isCompleted = completedTasks.includes(index);
            const isOff = item.phase === "off";
            const card = document.createElement("div");
            card.className = `day-card ${item.phase} ${isCompleted ? 'completed' : ''}`;
            card.dataset.index = index;

            let actionArea = `
                <button class="check-btn" onclick="toggleTask(${index})">
                    <i class="fa-solid ${isCompleted ? 'fa-circle-check' : 'fa-circle'}"></i>
                    <span>${isCompleted ? '完了' : '未完了'}</span>
                </button>
            `;

            if (isOff) {
                actionArea = `<div class="off-badge">行事休み</div>`;
            }

            card.innerHTML = `
                <div class="day-meta">
                    <span class="day-date">${item.date} (${item.day})</span>
                    <span class="day-label">${item.label}</span>
                </div>
                <div class="day-content">
                    <div class="day-title">${item.title}</div>
                    <div class="day-desc">${item.desc}</div>
                </div>
                <div class="day-action">
                    ${actionArea}
                </div>
            `;
            container.appendChild(card);
        });

        updateProgress();
    }

    // 進捗率の更新 (休みの日を除いた30日間を分母にします)
    function updateProgress() {
        const completedTasks = JSON.parse(localStorage.getItem("completedTasks") || "[]");
        const activeTasks = scheduleData.filter(item => item.phase !== "off");
        const totalActive = activeTasks.length; // 実動30日
        
        // 完了した実動タスクの数を集計
        let completedActiveCount = 0;
        completedTasks.forEach(index => {
            if (scheduleData[index] && scheduleData[index].phase !== "off") {
                completedActiveCount++;
            }
        });

        const percent = Math.round((completedActiveCount / totalActive) * 100);

        document.getElementById("completed-count").innerText = `${completedActiveCount} / ${totalActive}`;
        document.getElementById("progress-percent").innerText = `${percent}%`;
    }

    // タスク完了切り替え
    window.toggleTask = function(index) {
        let completedTasks = JSON.parse(localStorage.getItem("completedTasks") || "[]");
        
        if (completedTasks.includes(index)) {
            completedTasks = completedTasks.filter(item => item !== index);
        } else {
            completedTasks.push(index);
        }

        localStorage.setItem("completedTasks", JSON.stringify(completedTasks));
        generateTimeline();
    }

    window.onload = function() {
        updateCountdown();
        generateTimeline();
    }
</script>

</body>
</html>
