<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第2種電気工事士 技能補習日別スケジュール（1周目1日1問・6/27 4問・3周目1日2問）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --secondary: #fbbf24;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --border: #334155;
            --off-day: #1e1b4b; /* 行事休みの背景色 */
            --saturday-bg: #0f3f5c; /* 土曜特訓の背景色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 45px 20px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
            position: relative;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--text);
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ダッシュボードステータス */
        .status-bar {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: space-around;
            margin-top: -30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .status-item {
            text-align: center;
            min-width: 120px;
        }

        .status-val {
            display: block;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }

        .status-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* 凡例・ナビゲーション */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .view-title {
            font-size: 1.5rem;
            font-weight: bold;
            border-left: 6px solid var(--secondary);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-phase0 { background-color: var(--secondary); }
        .dot-groupA { background-color: #38bdf8; }
        .dot-groupB { background-color: #ec4899; }
        .dot-groupC { background-color: #a855f7; }
        .dot-groupD { background-color: #eab308; }
        .dot-phase2 { background-color: #10b981; }
        .dot-phase3 { background-color: #f43f5e; }
        .dot-off { background-color: #64748b; }
        .dot-sat { background-color: #38bdf8; border: 1px solid #fbbf24;}

        /* 日別カレンダーレイアウト */
        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border-left: 6px solid var(--border);
            display: grid;
            grid-template-columns: 180px 1fr 120px;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--border);
            border-left-width: 6px;
            transition: all 0.2s ease;
        }

        .day-card:hover {
            transform: translateX(5px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* 進行状況に応じたカードボーダーカラー */
        .p-0 { border-left-color: var(--secondary); }
        .g-a { border-left-color: #38bdf8; }
        .g-b { border-left-color: #ec4899; }
        .g-c { border-left-color: #a855f7; }
        .g-d { border-left-color: #eab308; }
        .p-2 { border-left-color: #10b981; }
        .p-3 { border-left-color: #f43f5e; }
        .off { 
            border-left-color: #64748b; 
            background: var(--off-day);
            opacity: 0.75;
        }
        .sat-special {
            border-left-color: var(--secondary);
            background: var(--saturday-bg);
            border-width: 2px 2px 2px 8px;
            border-color: var(--secondary);
        }

        .day-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-date {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text);
        }

        .day-label {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
        }

        .day-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .day-title {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .day-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        .day-action {
            display: flex;
            justify-content: flex-end;
        }

        /* カスタムチェックボックスボタン */
        .check-btn {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            width: 100%;
            justify-content: center;
        }

        .check-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
        }

        .day-card.completed {
            opacity: 0.6;
            background: rgba(30, 41, 59, 0.3);
        }

        .day-card.completed .check-btn {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #0f172a;
        }

        .day-card.completed .day-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 学校行事休みの特別装飾 */
        .off .check-btn {
            display: none;
        }
        .off-badge {
            background: #475569;
            color: #f1f5f9;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .day-card {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .day-action {
                justify-content: flex-start;
                width: 100%;
            }
            .status-bar {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fa-solid fa-calendar-days" style="color: var(--secondary);"></i> 技能補習日別ロードマップ</h1>

    </div>

    <!-- カレンダータイムライン -->

    </div>
</div>

    // 試験日
    const examDate = new Date("2026-07-18");

    // カウントダウン
    function updateCountdown() {
        const today = new Date("2026-05-26"); // 開発時仮日時基準
        const diffTime = examDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById("days-left").innerText = diffDays + "日";
    }

    // カレンダーUIの生成
    function generateTimeline() {
        const container = document.getElementById("schedule-timeline");
        container.innerHTML = "";

        const completedTasks = JSON.parse(localStorage.getItem("completedTasks") || "[]");

        scheduleData.forEach((item, index) => {
            const isCompleted = completedTasks.includes(index);
            const isOff = item.phase === "off";
            const card = document.createElement("div");
            card.className = `day-card ${item.phase} ${isCompleted ? 'completed' : ''}`;
            card.dataset.index = index;

            let actionArea = `
                <button class="check-btn" onclick="toggleTask(${index})">
                    <i class="fa-solid ${isCompleted ? 'fa-circle-check' : 'fa-circle'}"></i>
                    <span>${isCompleted ? '完了' : '未完了'}</span>
                </button>
            `;

            if (isOff) {
                actionArea = `<div class="off-badge">行事休み</div>`;
            }

            card.innerHTML = `
                <div class="day-meta">
                    <span class="day-date">${item.date} (${item.day})</span>
                    <span class="day-label">${item.label}</span>
                </div>
                <div class="day-content">
                    <div class="day-title">${item.title}</div>
                    <div class="day-desc">${item.desc}</div>
                </div>
                <div class="day-action">
                    ${actionArea}
                </div>
            `;
            container.appendChild(card);
        });

        updateProgress();
    }

    // 進捗率の更新 (休みの日を除いた実動日数を分母にします)
    function updateProgress() {
        const completedTasks = JSON.parse(localStorage.getItem("completedTasks") || "[]");
        const activeTasks = scheduleData.filter(item => item.phase !== "off");
        const totalActive = activeTasks.length; 
        
        // 完了した実動タスクの数を集計
        let completedActiveCount = 0;
        completedTasks.forEach(index => {
            if (scheduleData[index] && scheduleData[index].phase !== "off") {
                completedActiveCount++;
            }
        });

        const percent = Math.round((completedActiveCount / totalActive) * 100);

        document.getElementById("completed-count").innerText = `${completedActiveCount} / ${totalActive}`;
        document.getElementById("progress-percent").innerText = `${percent}%`;
    }

    // タスク完了切り替え
    window.toggleTask = function(index) {
        let completedTasks = JSON.parse(localStorage.getItem("completedTasks") || "[]");
        
        if (completedTasks.includes(index)) {
            completedTasks = completedTasks.filter(item => item !== index);
        } else {
            completedTasks.push(index);
        }

        localStorage.setItem("completedTasks", JSON.stringify(completedTasks));
        generateTimeline();
    }

    window.onload = function() {
        updateCountdown();
        generateTimeline();
    }
</script>

</body>
</html>
